name: CI Checks

on:
  workflow_call:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      PIP_ROOT_USER_ACTION: ignore

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Validate ETL configs
        run: python scripts/validate_configs.py

      - name: Run tests
        run: pytest -q
