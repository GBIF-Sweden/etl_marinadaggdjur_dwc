name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      image_name:
        description: "Optional image name override (defaults to repository name)"
        required: false
        type: string

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  quality:
    uses: ./.github/workflows/ci.yml

  docker:
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          if [ -n "${{ github.event.inputs.image_name }}" ]; then
            echo "name=${{ github.event.inputs.image_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ steps.image.outputs.name }}
          tags: |
            # Version tag from git tag refs, e.g. refs/tags/v0.1.0 -> v0.1.0
            type=ref,event=tag
            # Branch tag from branch refs, e.g. refs/heads/master -> master
            type=ref,event=branch
            # Immutable tag per commit, e.g. sha-860c190
            type=sha,prefix=sha-
            # Keep latest on default-branch builds
            type=raw,value=latest,enable={{is_default_branch}}
            # Also keep latest aligned with release tags (v*)
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
